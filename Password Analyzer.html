<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Analyzer</title>

    <style>
        body{
            background-image: url('https://plus.unsplash.com/premium_photo-1661877737564-3dfd7282efcb?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Y3liZXIlMjBzZWN1cml0eXxlbnwwfHwwfHx8MA%3D%3D');
            background-repeat:no-repeat;
            background-size:cover;
            text-align:center;
            color:#F8FAFC;
            font-family:Arial, sans-serif;
        }

        h1{
            color:#F8FAFC;
        }

        .container{
            border-radius:10px;
            background-color:#1E293B;
            min-height:300px;
            width:380px;
            padding:20px;
            margin:auto;
            margin-top:30px;
        }

        #password{
            height:35px;
            width:250px;
            border-radius:8px;
            border:none;
            padding-left:10px;
        }

        button{
            background-color:#3B82F6;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background-color:#2563EB;
        }

        #result{
            color:#F8FAFC;
            font-size:16px;
            text-align:left;
            margin-top:15px;
        }

        .weak{
            color:red;
            font-weight:bold;
        }

        .moderate{
            color:orange;
            font-weight:bold;
        }

        .strong{
            color:lime;
            font-weight:bold;
        }
    </style>
</head>

<body>

    <h1>Password Analyzer</h1>

    <div class="container">

        <label for="password">Enter your password:</label>
        <br><br>

        <input type="password" id="password" placeholder="Password">

        <br><br>

        <button onclick="analyze()">Analyze</button>

        <p id="result"></p>

    </div>

    <script>

        function analyze(){

            let password = document.getElementById("password").value;

            let suggestion = password;

            let uppercase = /[A-Z]/.test(password);
            let lowercase = /[a-z]/.test(password);
            let digit = /[0-9]/.test(password);
            let specialchar = /[^A-Za-z0-9]/.test(password);

            let score = 0;

            if(password.length >= 8) score++;
            if(uppercase) score++;
            if(lowercase) score++;
            if(digit) score++;
            if(specialchar) score++;

            let missing = "";

            if(password.length < 8){
                missing += "❌ Minimum 8 Characters<br>";
            }

            if(!uppercase){
                missing += "❌ Uppercase Letter<br>";
                suggestion += "A";
            }

            if(!lowercase){
                missing += "❌ Lowercase Letter<br>";
                suggestion += "a";
            }

            if(!digit){
                missing += "❌ Digit<br>";
                suggestion += "1";
            }

            if(!specialchar){
                missing += "❌ Special Character<br>";
                suggestion += "@";
            }

            while(suggestion.length < 8){
                suggestion += "X";
            }

            let strength;
            let strengthClass;

            if(password.length < 8){
                strength = "Weak";
                strengthClass = "weak";
            }
            else if(score === 5){
                strength = "Strong";
                strengthClass = "strong";
            }
            else{
                strength = "Moderately Strong";
                strengthClass = "moderate";
            }

            document.getElementById("result").innerHTML = `

                <b>Password Length:</b> ${password.length}
                <br><br>

                <b>Requirements Status</b><br>

                Uppercase: ${uppercase ? "✅" : "❌"}<br>
                Lowercase: ${lowercase ? "✅" : "❌"}<br>
                Digit: ${digit ? "✅" : "❌"}<br>
                Special Character: ${specialchar ? "✅" : "❌"}<br>

                <br>

                <b>Missing Requirements:</b><br>
                ${missing || "✅ None"}

                <br><br>

                <b>Strength:</b>
                <span class="${strengthClass}">
                    ${strength}
                </span>

                ${strength !== "Strong"
                    ? `<br><br><b>Suggested Password:</b><br>${suggestion}`
                    : ""
                }
            `;
        }

    </script>

</body>
</html>
